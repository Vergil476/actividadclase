Resources:
  NetflixAppBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: netflix-static-assets-001

  AppServerInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c55b159cbfafe1f0  # Amazon Linux 2
      Tags:
        - Key: Name
          Value: NetflixWorkerNode
